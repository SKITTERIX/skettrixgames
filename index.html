<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Player</title> 
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }

        #game-container {
            width: 95vw;
            height: 95vh;
            max-width: 800px; 
            max-height: 600px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background: #000;
        }

        ruffle-player {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        
        window.RufflePlayer.config = {
            "letterbox": "on",
            "scale": "showAll",
            "forceScale": true,
            "autoPlay": "on",
            "unmuteOverlay": "hidden",
            "splashScreen": true // Set this to true if you decide to keep the logo
        };

        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("game-container");
            container.appendChild(player);

            // 1. Get the game name from the URL (e.g., ?g=mario)
            const urlParams = new URLSearchParams(window.location.search);
            const gameName = urlParams.get('g');

            if (gameName) {
                // 2. Load the SWF based on the URL parameter
                player.load(gameName + ".swf").then(() => {
                    document.title = "Playing: " + gameName;
                    console.log("Loaded: " + gameName);
                }).catch((e) => {
                    console.error("Ruffle failed to load:", e);
                });
            } else {
                container.innerHTML = "<h2 style='color:white;'>No game specified!</h2>";
            }
        });
    </script>
</body>
</html>
